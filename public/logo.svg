<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Moon glow effect -->
    <radialGradient id="moonGlow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>

    <!-- Moon surface gradient -->
    <radialGradient id="moonSurface" cx="42%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fef9e7"/>
      <stop offset="25%" stop-color="#fde68a"/>
      <stop offset="55%" stop-color="#fbbf24"/>
      <stop offset="85%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>

    <!-- Crater dark fill -->
    <radialGradient id="craterDark" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#b45309" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.1"/>
    </radialGradient>

    <!-- Crater medium fill -->
    <radialGradient id="craterMed" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#b45309" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.05"/>
    </radialGradient>

    <!-- Crater light fill -->
    <radialGradient id="craterLight" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#92400e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>

    <!-- Background gradient (night sky) -->
    <linearGradient id="bgGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>

    <!-- Text shadow glow -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#fbbf24" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Mare (dark patches) texture -->
    <radialGradient id="mare1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#92400e" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#b45309" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: full square fill -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Subtle stars -->
  <circle cx="70" cy="50" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="440" cy="40" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="45" cy="180" r="1" fill="white" opacity="0.4"/>
  <circle cx="468" cy="160" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="90" cy="440" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="420" cy="460" r="1" fill="white" opacity="0.3"/>
  <circle cx="380" cy="480" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="80" cy="310" r="1" fill="white" opacity="0.35"/>
  <circle cx="450" cy="300" r="1" fill="white" opacity="0.4"/>
  <circle cx="160" cy="35" r="1" fill="white" opacity="0.3"/>
  <circle cx="340" cy="30" r="1.5" fill="white" opacity="0.45"/>
  <circle cx="30" cy="120" r="1" fill="white" opacity="0.3"/>
  <circle cx="485" cy="240" r="1" fill="white" opacity="0.35"/>
  <circle cx="25" cy="400" r="1.2" fill="white" opacity="0.3"/>
  <circle cx="490" cy="420" r="1" fill="white" opacity="0.25"/>

  <!--
    Layout centering math:
    Moon diameter: 260px (r=130)
    Gap between moon bottom and text baseline: ~30px
    Text height: ~75px (visual)
    Total content height: 260 + 30 + 75 = 365px
    Top offset: (512 - 365) / 2 = ~73px
    Moon center Y: 73 + 130 = 203
    Text baseline Y: 203 + 130 + 30 + 60 = 423
    Horizontal center: 256
  -->

  <!-- Moon glow (outer halo) -->
  <circle cx="256" cy="203" r="200" fill="url(#moonGlow)"/>

  <!-- Moon body -->
  <circle cx="256" cy="203" r="130" fill="url(#moonSurface)"/>

  <!-- Mare (dark sea areas - large patches) -->
  <ellipse cx="235" cy="183" rx="40" ry="30" fill="url(#mare1)" opacity="0.6"/>
  <ellipse cx="290" cy="218" rx="35" ry="25" fill="url(#mare1)" opacity="0.5"/>
  <ellipse cx="250" cy="238" rx="28" ry="18" fill="url(#mare1)" opacity="0.4"/>

  <!-- Large craters -->
  <circle cx="220" cy="173" r="22" fill="url(#craterDark)" opacity="0.4"/>
  <circle cx="220" cy="173" r="20" fill="none" stroke="#b45309" stroke-width="0.8" opacity="0.2"/>

  <circle cx="295" cy="213" r="16" fill="url(#craterDark)" opacity="0.35"/>
  <circle cx="295" cy="213" r="14.5" fill="none" stroke="#b45309" stroke-width="0.6" opacity="0.15"/>

  <circle cx="305" cy="183" r="13" fill="url(#craterMed)" opacity="0.3"/>
  <circle cx="305" cy="183" r="11.5" fill="none" stroke="#b45309" stroke-width="0.5" opacity="0.12"/>

  <!-- Medium craters -->
  <circle cx="245" cy="243" r="10" fill="url(#craterMed)" opacity="0.3"/>
  <circle cx="200" cy="213" r="12" fill="url(#craterMed)" opacity="0.25"/>
  <circle cx="270" cy="163" r="8" fill="url(#craterLight)" opacity="0.3"/>
  <circle cx="325" cy="203" r="9" fill="url(#craterMed)" opacity="0.25"/>
  <circle cx="240" cy="203" r="7" fill="url(#craterLight)" opacity="0.25"/>

  <!-- Small craters (surface texture) -->
  <circle cx="215" cy="153" r="4" fill="url(#craterLight)" opacity="0.25"/>
  <circle cx="260" cy="178" r="3.5" fill="url(#craterLight)" opacity="0.2"/>
  <circle cx="280" cy="243" r="5" fill="url(#craterLight)" opacity="0.2"/>
  <circle cx="190" cy="193" r="3" fill="url(#craterLight)" opacity="0.2"/>
  <circle cx="310" cy="228" r="4" fill="url(#craterLight)" opacity="0.18"/>
  <circle cx="230" cy="223" r="3" fill="url(#craterLight)" opacity="0.15"/>
  <circle cx="270" cy="198" r="2.5" fill="url(#craterLight)" opacity="0.15"/>
  <circle cx="340" cy="193" r="3" fill="url(#craterLight)" opacity="0.12"/>
  <circle cx="195" cy="238" r="3.5" fill="url(#craterLight)" opacity="0.15"/>
  <circle cx="315" cy="168" r="2.5" fill="url(#craterLight)" opacity="0.12"/>

  <!-- Tiny surface dots -->
  <circle cx="250" cy="158" r="1.5" fill="#b45309" opacity="0.12"/>
  <circle cx="275" cy="233" r="1.5" fill="#b45309" opacity="0.1"/>
  <circle cx="210" cy="228" r="1.5" fill="#b45309" opacity="0.1"/>
  <circle cx="330" cy="208" r="1" fill="#b45309" opacity="0.08"/>
  <circle cx="185" cy="178" r="1.5" fill="#b45309" opacity="0.1"/>

  <!-- Moon highlight (top-left shine for 3D effect) -->
  <ellipse cx="220" cy="163" rx="80" ry="70" fill="white" opacity="0.07"/>
  <ellipse cx="205" cy="153" rx="50" ry="40" fill="white" opacity="0.05"/>

  <!-- Moon rim light (subtle edge glow) -->
  <circle cx="256" cy="203" r="129" fill="none" stroke="#fef3c7" stroke-width="1.5" opacity="0.3"/>

  <!-- "Zo" text with glow effect -->
  <text x="256" y="423" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="100" font-weight="700" letter-spacing="8" fill="url(#textGrad)" filter="url(#textGlow)">Zo</text>
</svg>
